<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Exhaustive flat search versus FAISS clustered index</title>
  <rect width="720" height="470" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Search ke 2 tarike - Scratch vs FAISS</text>

  <text x="185" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Scratch (Flat) - har vector se compare</text>
  <circle cx="185" cy="90" r="14" fill="#6366f1"/>
  <text x="185" y="95" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Q</text>
  <g stroke="#fca5a5" stroke-width="1">
    <line x1="185" y1="90" x2="70" y2="170"/><line x1="185" y1="90" x2="130" y2="200"/>
    <line x1="185" y1="90" x2="200" y2="180"/><line x1="185" y1="90" x2="260" y2="160"/>
    <line x1="185" y1="90" x2="90" y2="240"/><line x1="185" y1="90" x2="180" y2="250"/>
    <line x1="185" y1="90" x2="260" y2="230"/><line x1="185" y1="90" x2="120" y2="290"/>
    <line x1="185" y1="90" x2="230" y2="290"/>
  </g>
  <g fill="#94a3b8">
    <circle cx="70" cy="170" r="6"/><circle cx="130" cy="200" r="6"/><circle cx="200" cy="180" r="6"/>
    <circle cx="260" cy="160" r="6"/><circle cx="90" cy="240" r="6"/><circle cx="180" cy="250" r="6"/>
    <circle cx="260" cy="230" r="6"/><circle cx="120" cy="290" r="6"/><circle cx="230" cy="290" r="6"/>
  </g>
  <text x="185" y="330" text-anchor="middle" font-size="11" fill="#dc2626">9 vectors = 9 comparisons</text>
  <text x="185" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">10 lakh = 10 lakh! (slow)</text>

  <line x1="360" y1="55" x2="360" y2="360" stroke="#e5e7eb" stroke-width="1.5"/>

  <text x="535" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">FAISS (Index) - sirf sahi cluster</text>
  <circle cx="535" cy="90" r="14" fill="#6366f1"/>
  <text x="535" y="95" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Q</text>

  <ellipse cx="450" cy="180" rx="55" ry="45" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <ellipse cx="600" cy="180" rx="55" ry="45" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <ellipse cx="525" cy="290" rx="55" ry="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="235" text-anchor="middle" font-size="9" fill="#94a3b8">cluster A</text>
  <text x="600" y="235" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">cluster B (paas!)</text>
  <text x="525" y="335" text-anchor="middle" font-size="9" fill="#94a3b8">cluster C</text>

  <g fill="#94a3b8">
    <circle cx="435" cy="170" r="6"/><circle cx="465" cy="190" r="6"/><circle cx="450" cy="160" r="6"/>
    <circle cx="510" cy="280" r="6"/><circle cx="540" cy="300" r="6"/><circle cx="525" cy="270" r="6"/>
  </g>
  <g fill="#16a34a">
    <circle cx="585" cy="170" r="6"/><circle cx="615" cy="190" r="6"/><circle cx="600" cy="165" r="6"/>
  </g>
  <line x1="535" y1="90" x2="600" y2="150" stroke="#16a34a" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="535" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">sirf cluster B check (3 vectors)</text>

  <rect x="60" y="385" width="600" height="70" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="360" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Dono ka result SAME (0.417 Refund) - FAISS ne sirf SPEED badhai, quality nahi todi</text>
  <text x="360" y="428" text-anchor="middle" font-size="10" fill="#92400e">Index types: IndexFlatL2 (distance), IndexFlatIP (cosine, normalize karke), IndexHNSWFlat (clustering = fast)</text>
  <text x="360" y="446" text-anchor="middle" font-size="10" fill="#92400e">Trade-off: HNSW "approximate" - thodi accuracy de ke bahut speed leta (ANN)</text>
</svg>
