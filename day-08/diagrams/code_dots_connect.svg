<svg viewBox="0 0 760 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>rag_bot.py explained — each block mapped to the day it came from</title>
  <rect width="760" height="640" fill="#0f172a"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="800" fill="#f8fafc">rag_bot.py — har line ek din ki skill</text>
  <text x="380" y="52" text-anchor="middle" font-size="11" fill="#94a3b8">RAGBot class = ApiClient service. Do methods: ingest (setup) + ask (per query)</text>

  <rect x="30" y="70" width="700" height="70" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="45" y="94" font-size="12" font-weight="700" fill="#818cf8">class RAGBot: __init__(self)  = constructor (setup)</text>
  <text x="55" y="114" font-size="10.5" fill="#cbd5e1" font-family="monospace">self.collection = chromadb.PersistentClient(...)  ·  self.llm = Anthropic()</text>
  <rect x="600" y="80" width="120" height="24" rx="6" fill="#3730a3"/>
  <text x="660" y="97" text-anchor="middle" font-size="9.5" fill="#e0e7ff">Day 5 + Day 1</text>
  <text x="55" y="131" font-size="9" fill="#64748b">ek Chroma DB (persistent) + ek Claude client — bot ke do hathiyar</text>

  <rect x="30" y="155" width="345" height="240" rx="10" fill="#132a1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="45" y="178" font-size="13" font-weight="800" fill="#4ade80">ingest(pdf) - EK BAAR (setup)</text>
  <rect x="45" y="190" width="315" height="34" rx="6" fill="#1e293b"/>
  <text x="55" y="205" font-size="9.5" font-family="monospace" fill="#cbd5e1">if count &gt; 0: return  (dobara embed skip)</text>
  <text x="55" y="219" font-size="8.5" fill="#22c55e">Day 5 - persistence (fast path)</text>
  <rect x="45" y="230" width="315" height="34" rx="6" fill="#1e293b"/>
  <text x="55" y="245" font-size="9.5" font-family="monospace" fill="#cbd5e1">PyPDFLoader(pdf).load()</text>
  <text x="55" y="259" font-size="8.5" fill="#22c55e">Day 6 - load (binary PDF to text+metadata)</text>
  <rect x="45" y="270" width="315" height="34" rx="6" fill="#1e293b"/>
  <text x="55" y="285" font-size="9.5" font-family="monospace" fill="#cbd5e1">_clean(text)  (boilerplate hatao)</text>
  <text x="55" y="299" font-size="8.5" fill="#22c55e">Day 6 - clean (blurry vectors se bachao)</text>
  <rect x="45" y="310" width="315" height="34" rx="6" fill="#1e293b"/>
  <text x="55" y="325" font-size="9.5" font-family="monospace" fill="#cbd5e1">RecursiveCharacterTextSplitter(...)</text>
  <text x="55" y="339" font-size="8.5" fill="#22c55e">Day 3 - chunk (step=size-overlap)</text>
  <rect x="45" y="350" width="315" height="34" rx="6" fill="#1e293b"/>
  <text x="55" y="365" font-size="9.5" font-family="monospace" fill="#cbd5e1">collection.add(ids, docs, metadatas)</text>
  <text x="55" y="379" font-size="8.5" fill="#22c55e">Day 5 - store (+ Day 6 metadata: page)</text>

  <rect x="390" y="155" width="340" height="240" rx="10" fill="#2a1e13" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="405" y="178" font-size="13" font-weight="800" fill="#fbbf24">ask(query) - HAR SAWAAL</text>
  <rect x="405" y="190" width="310" height="34" rx="6" fill="#1e293b"/>
  <text x="415" y="205" font-size="9.5" font-family="monospace" fill="#cbd5e1">collection.query(query, n_results=TOP_K)</text>
  <text x="415" y="219" font-size="8.5" fill="#fbbf24">Day 2 + Day 7 - semantic retrieve, top_k</text>
  <rect x="405" y="230" width="310" height="34" rx="6" fill="#1e293b"/>
  <text x="415" y="245" font-size="9.5" font-family="monospace" fill="#cbd5e1">if dist &lt;= THRESHOLD  (door reject)</text>
  <text x="415" y="259" font-size="8.5" fill="#fbbf24">Day 7 - threshold (anti-hallucination)</text>
  <rect x="405" y="270" width="310" height="34" rx="6" fill="#1e293b"/>
  <text x="415" y="285" font-size="9.5" font-family="monospace" fill="#cbd5e1">if not good: return "jaankari nahi mili"</text>
  <text x="415" y="299" font-size="8.5" fill="#fbbf24">Day 1 + Day 7 - grounding / imaandaari</text>
  <rect x="405" y="310" width="310" height="34" rx="6" fill="#1e293b"/>
  <text x="415" y="325" font-size="9.5" font-family="monospace" fill="#cbd5e1">llm.messages.create(prompt + context)</text>
  <text x="415" y="339" font-size="8.5" fill="#fbbf24">Day 1 - Claude generate (context se)</text>
  <rect x="405" y="350" width="310" height="34" rx="6" fill="#1e293b"/>
  <text x="415" y="365" font-size="9.5" font-family="monospace" fill="#cbd5e1">return {"answer":..., "sources": pages}</text>
  <text x="415" y="379" font-size="8.5" fill="#fbbf24">Day 6 - citations (page numbers)</text>

  <line x1="205" y1="395" x2="205" y2="425" stroke="#64748b" stroke-width="2" marker-end="url(#w)"/>
  <line x1="560" y1="395" x2="560" y2="425" stroke="#64748b" stroke-width="2" marker-end="url(#w)"/>
  <text x="205" y="418" text-anchor="middle" font-size="9" fill="#94a3b8">chunks stored</text>
  <text x="560" y="418" text-anchor="middle" font-size="9" fill="#94a3b8">{answer, sources}</text>

  <rect x="130" y="430" width="500" height="52" rx="10" fill="#132a1e" stroke="#16a34a" stroke-width="2"/>
  <text x="380" y="452" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">LIVE: "EMI bounce penalty?" to "Rs 1,000 + GST, T+1 din" page[2,7]</text>
  <text x="380" y="471" text-anchor="middle" font-size="10" fill="#86efac">"pizza price?" to "jaankari nahi mili" (threshold ne roka)</text>

  <rect x="30" y="500" width="700" height="60" rx="10" fill="#1e2749" stroke="#6366f1" stroke-width="1.5"/>
  <text x="45" y="522" font-size="12" font-weight="700" fill="#a5b4fc">app.py (Streamlit UI) - engine ko import: bot.ask(query)</text>
  <text x="55" y="542" font-size="10" fill="#cbd5e1">st.session_state.bot = RAGBot()  = React useState (warna har re-run pe reset)</text>
  <text x="55" y="556" font-size="9" fill="#818cf8">UI logic nahi jaanti - sirf engine bulati (separation of concerns)</text>

  <text x="380" y="590" text-anchor="middle" font-size="12" font-weight="800" fill="#f8fafc">8 din ki skills = 1 file. Yahi "dots connect" hai.</text>
  <text x="380" y="612" text-anchor="middle" font-size="10" fill="#94a3b8">ingest = setup pipeline (D3+D5+D6) · ask = query pipeline (D1+D2+D6+D7)</text>

  <defs>
    <marker id="w" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#64748b"/></marker>
  </defs>
</svg>
