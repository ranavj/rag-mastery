  <text x="558" y="99" text-anchor="middle" font-size="9" fill="#16a34a">koi re-embedding NAHI (0 sec)</text>

  <line x1="393" y1="110" x2="455" y2="130" stroke="#dc2626" stroke-width="2" marker-end="url(#r)"/>
  <text x="420" y="130" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">NAHI</text>
  <rect x="458" y="118" width="200" height="46" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="558" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">SLOW: embed + save</text>
  <text x="558" y="155" text-anchor="middle" font-size="9" fill="#dc2626">sirf PEHLI baar (phir disk pe)</text>

  <ellipse cx="318" cy="165" rx="60" ry="11" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <path d="M258 165 L258 195 A60 11 0 0 0 378 195 L378 165" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <ellipse cx="318" cy="165" rx="60" ry="11" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="318" y="188" text-anchor="middle" font-size="9" font-weight="700" fill="#0369a1">DISK</text>
  <text x="318" y="215" text-anchor="middle" font-size="8.5" fill="#0284c7">my_store.json / chroma_db/</text>
  <text x="318" y="228" text-anchor="middle" font-size="8.5" fill="#0284c7">(= localStorage/IndexedDB)</text>

  <line x1="40" y1="250" x2="680" y2="250" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="60" y="280" font-size="13" font-weight="700" fill="#374151">2. Metadata filter = retrieval bug ka ilaaj (live dekha!)</text>
  <text x="60" y="300" font-size="10.5" fill="#6b7280">Query: "saamaan kitne din mein aayega?" (shipping sawaal — par "din" pe model confuse)</text>

  <text x="185" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Bina filter</text>
  <rect x="60" y="340" width="250" height="34" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="72" y="361" font-size="10" fill="#7f1d1d">1.027  Refund doc  [refund] = GALAT #1!</text>
  <rect x="60" y="380" width="250" height="34" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="72" y="401" font-size="10" fill="#374151">1.034  Express delivery  [shipping]</text>
  <text x="185" y="438" text-anchor="middle" font-size="9" fill="#dc2626">"din" wali confusion (Day 2 wala bug)</text>

  <line x1="330" y1="380" x2="390" y2="380" stroke="#9333ea" stroke-width="2.5" marker-end="url(#p)"/>
  <text x="360" y="368" text-anchor="middle" font-size="9" font-weight="700" fill="#9333ea">where=</text>
  <text x="360" y="398" text-anchor="middle" font-size="8.5" fill="#9333ea">{"category":</text>
  <text x="360" y="410" text-anchor="middle" font-size="8.5" fill="#9333ea">"shipping"}</text>

  <text x="535" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Filter ke saath</text>
  <rect x="410" y="340" width="250" height="34" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="422" y="361" font-size="10" fill="#14532d">1.034  Express delivery  [shipping] #1</text>
  <rect x="410" y="380" width="250" height="34" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="422" y="401" font-size="10" fill="#14532d">1.379  Standard delivery  [shipping]</text>
  <text x="535" y="438" text-anchor="middle" font-size="9" fill="#16a34a">Refund doc race se hi BAHAR (dekha hi nahi)</text>

  <rect x="60" y="460" width="600" height="80" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="360" y="483" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Yaad rakhne wali 3 cheezein</text>
  <text x="360" y="503" text-anchor="middle" font-size="10" fill="#92400e">- Chroma DISTANCE deta hai = KAM = zyada similar (L2 wala ulta khel)</text>
  <text x="360" y="519" text-anchor="middle" font-size="10" fill="#92400e">- metadata = data- attributes jaisa LABEL (asli file nahi!) — asli PDF Day 6 mein</text>
  <text x="360" y="535" text-anchor="middle" font-size="10" fill="#92400e">- paths ko __file__ se baandho (relative path bug — khud pakda!)</text>

