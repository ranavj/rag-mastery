<svg viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Day 5: persistence flow and ChromaDB metadata filtering</title>
  <rect width="720" height="560" fill="#ffffff"/>

  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Day 5 — Persistence + ChromaDB</text>

  <text x="60" y="60" font-size="13" font-weight="700" fill="#374151">1. Persistence = localStorage pattern (fast path / slow path)</text>

  <rect x="60" y="75" width="130" height="42" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="125" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">script chali</text>

  <line x1="190" y1="96" x2="240" y2="96" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="243" y="70" width="150" height="52" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="318" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">disk pe file hai?</text>
  <text x="318" y="110" text-anchor="middle" font-size="9" fill="#ca8a04">load() / collection.count()</text>

  <line x1="393" y1="85" x2="455" y2="85" stroke="#16a34a" stroke-width="2" marker-end="url(#g)"/>
  <text x="424" y="77" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">HAAN</text>
  <rect x="458" y="62" width="200" height="46" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
