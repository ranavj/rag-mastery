<svg viewBox="0 0 760 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Routing architecture — router level and source level, one ChromaDB many collections</title>
  <rect width="760" height="580" fill="#0f172a"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="800" fill="#f8fafc">Routing ka structure — do LEVEL</text>

  <rect x="300" y="50" width="160" height="40" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="380" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#a5b4fc">"chhutti kitni?"</text>
  <line x1="380" y1="90" x2="380" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <rect x="120" y="118" width="520" height="110" rx="12" fill="#2a1e13" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="380" y="140" text-anchor="middle" font-size="13" font-weight="800" fill="#fbbf24">LEVEL 1 — ROUTER (receptionist)</text>
  <text x="380" y="158" text-anchor="middle" font-size="9.5" fill="#fcd34d">query ko har source ke DESCRIPTION se compare -> best chuno</text>
  <rect x="140" y="168" width="150" height="48" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="215" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#cbd5e1">HR desc</text>
  <text x="215" y="202" text-anchor="middle" font-size="8" fill="#94a3b8">"leave, salary, hours"</text>
  <text x="215" y="212" text-anchor="middle" font-size="9" font-weight="700" fill="#4ade80">win</text>
  <rect x="305" y="168" width="150" height="48" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="380" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#cbd5e1">FINANCE desc</text>
  <text x="380" y="202" text-anchor="middle" font-size="8" fill="#94a3b8">"EMI, refund, rate"</text>
  <rect x="470" y="168" width="150" height="48" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="545" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#cbd5e1">TECH desc</text>
  <text x="545" y="202" text-anchor="middle" font-size="8" fill="#94a3b8">"password, VPN, IT"</text>

  <line x1="215" y1="228" x2="215" y2="258" stroke="#4ade80" stroke-width="2.5" marker-end="url(#g)"/>
  <text x="255" y="248" font-size="9" font-weight="700" fill="#4ade80">HR chuna</text>

  <text x="380" y="278" text-anchor="middle" font-size="13" font-weight="800" fill="#38bdf8">LEVEL 2 — har SOURCE ka apna collection (chunk-embed-store)</text>

  <rect x="40" y="290" width="220" height="120" rx="10" fill="#0c2a1e" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">HR collection (chosen)</text>
  <ellipse cx="150" cy="330" rx="55" ry="9" fill="#132a1e" stroke="#22c55e"/>
  <path d="M95 330 L95 385 A55 9 0 0 0 205 385 L205 330" fill="#132a1e" stroke="#22c55e" stroke-width="1"/>
  <text x="150" y="352" text-anchor="middle" font-size="8.5" fill="#86efac">leave: 12 din</text>
  <text x="150" y="366" text-anchor="middle" font-size="8.5" fill="#86efac">hours: 9:30-6:30</text>
  <text x="150" y="380" text-anchor="middle" font-size="8.5" fill="#86efac">salary: last day</text>

  <rect x="275" y="290" width="210" height="120" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="380" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">FINANCE collection</text>
  <ellipse cx="380" cy="330" rx="55" ry="9" fill="#0f172a" stroke="#475569"/>
  <path d="M325 330 L325 385 A55 9 0 0 0 435 385 L435 330" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="380" y="358" text-anchor="middle" font-size="8.5" fill="#64748b">EMI, refund, rate...</text>

  <rect x="500" y="290" width="220" height="120" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="610" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">TECH collection</text>
  <ellipse cx="610" cy="330" rx="55" ry="9" fill="#0f172a" stroke="#475569"/>
  <path d="M555 330 L555 385 A55 9 0 0 0 665 385 L665 330" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="610" y="358" text-anchor="middle" font-size="8.5" fill="#64748b">password, VPN...</text>

  <line x1="150" y1="410" x2="150" y2="435" stroke="#4ade80" stroke-width="2" marker-end="url(#g)"/>
  <rect x="60" y="438" width="180" height="34" rx="8" fill="#132a1e" stroke="#22c55e"/>
  <text x="150" y="459" text-anchor="middle" font-size="9.5" fill="#86efac">retrieve: "leave 12 din"</text>

  <rect x="40" y="490" width="680" height="80" rx="10" fill="#1e2749" stroke="#6366f1" stroke-width="1.5"/>
  <text x="380" y="512" text-anchor="middle" font-size="12" font-weight="800" fill="#a5b4fc">Picture clear:</text>
  <text x="380" y="532" text-anchor="middle" font-size="10" fill="#cbd5e1">EK ChromaDB, par KAI collections (har source = ek collection) — jaise 1 database, kai tables</text>
  <text x="380" y="550" text-anchor="middle" font-size="10" fill="#cbd5e1">Router alag chhota index (sirf source DESCRIPTIONS ka). Chunks/embeddings har collection ke ANDAR.</text>
  <text x="380" y="566" text-anchor="middle" font-size="9.5" fill="#818cf8">Sirf CHUNA hua source retrieve hota — baaki collections ko haath nahi (isliye sharp + fast)</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#64748b"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#4ade80"/></marker>
  </defs>
</svg>
