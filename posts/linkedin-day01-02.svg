<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif" role="img">
  <title>RAG for Frontend Developers — Day 1-2 learning summary</title>
  <rect width="1080" height="1080" fill="#0f172a"/>
  <rect x="0" y="0" width="1080" height="10" fill="#6366f1"/>
  <text x="60" y="110" font-size="30" font-weight="700" fill="#818cf8" letter-spacing="2">LEARNING RAG · DAY 1-2</text>
  <text x="60" y="185" font-size="62" font-weight="800" fill="#f8fafc">RAG for a</text>
  <text x="60" y="255" font-size="62" font-weight="800" fill="#f8fafc">Frontend Developer</text>
  <rect x="60" y="300" width="960" height="230" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="90" y="350" font-size="24" font-weight="700" fill="#94a3b8">The loop you already know:</text>
  <text x="90" y="405" font-size="34" font-weight="800" fill="#38bdf8">user action -&gt; fetch() -&gt; render()</text>
  <text x="90" y="455" font-size="24" font-weight="700" fill="#94a3b8">Turns out RAG is the same story:</text>
  <text x="90" y="505" font-size="34" font-weight="800" fill="#34d399">query -&gt; retrieve -&gt; generate</text>
  <text x="60" y="600" font-size="28" font-weight="700" fill="#f8fafc">3 things that surprised me:</text>
  <circle cx="88" cy="655" r="20" fill="#6366f1"/>
  <text x="88" y="663" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">1</text>
  <text x="128" y="650" font-size="26" font-weight="700" fill="#e2e8f0">LLMs don't know your data</text>
  <text x="128" y="685" font-size="21" fill="#94a3b8">Retraining = rebuilding your whole app. RAG just</text>
  <text x="128" y="713" font-size="21" fill="#94a3b8">hands the model the right doc at runtime.</text>
  <circle cx="88" cy="770" r="20" fill="#10b981"/>
  <text x="88" y="778" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">2</text>
  <text x="128" y="765" font-size="26" font-weight="700" fill="#e2e8f0">Keyword search quietly fails</text>
  <text x="128" y="800" font-size="21" fill="#94a3b8">"refund" is not "paisa wapas" for plain matching.</text>
  <text x="128" y="828" font-size="21" fill="#94a3b8">Embeddings capture meaning, not just words.</text>
  <circle cx="88" cy="885" r="20" fill="#f59e0b"/>
  <text x="88" y="893" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">3</text>
  <text x="128" y="880" font-size="26" font-weight="700" fill="#e2e8f0">Built cosine similarity from scratch</text>
  <text x="128" y="915" font-size="21" fill="#94a3b8">My hand-math matched the library exactly.</text>
  <text x="128" y="943" font-size="21" fill="#94a3b8">The black box became just arithmetic.</text>
  <line x1="60" y1="985" x2="1020" y2="985" stroke="#334155" stroke-width="1.5"/>
  <text x="60" y="1035" font-size="26" font-weight="700" fill="#818cf8">github.com/ranavj/rag-mastery</text>
  <text x="1020" y="1035" text-anchor="end" font-size="24" font-weight="700" fill="#64748b">#BuildInPublic · 25-day journey</text>
</svg>
