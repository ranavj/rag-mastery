<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Cosine similarity as the angle between vectors</title>
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Cosine similarity = do teero ke beech ka ANGLE</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#6b7280">Chhota angle = same direction = zyada similar (score 1 ke paas)</text>

  <g>
    <line x1="60" y1="340" x2="260" y2="340" stroke="#d1d5db" stroke-width="1"/>
    <line x1="60" y1="340" x2="60" y2="120" stroke="#d1d5db" stroke-width="1"/>
    <line x1="60" y1="340" x2="220" y2="170" stroke="#16a34a" stroke-width="3" marker-end="url(#g)"/>
    <text x="225" y="165" font-size="11" font-weight="600" fill="#15803d">"refund"</text>
    <line x1="60" y1="340" x2="210" y2="200" stroke="#2563eb" stroke-width="3" marker-end="url(#b)"/>
    <text x="215" y="215" font-size="11" font-weight="600" fill="#1d4ed8">"paisa wapas"</text>
    <path d="M 130 290 A 65 65 0 0 0 122 300" fill="none" stroke="#9333ea" stroke-width="2"/>
    <text x="150" y="300" font-size="11" font-weight="700" fill="#9333ea">chhota</text>
    <text x="160" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">score = 0.9 (similar)</text>
  </g>

  <g>
    <line x1="440" y1="340" x2="660" y2="340" stroke="#d1d5db" stroke-width="1"/>
    <line x1="440" y1="340" x2="440" y2="120" stroke="#d1d5db" stroke-width="1"/>
    <line x1="440" y1="340" x2="610" y2="180" stroke="#16a34a" stroke-width="3" marker-end="url(#g)"/>
    <text x="615" y="175" font-size="11" font-weight="600" fill="#15803d">"refund"</text>
    <line x1="440" y1="340" x2="470" y2="140" stroke="#ea580c" stroke-width="3" marker-end="url(#o)"/>
    <text x="455" y="130" font-size="11" font-weight="600" fill="#c2410c">"shipping"</text>
    <path d="M 500 290 A 75 75 0 0 0 460 270" fill="none" stroke="#9333ea" stroke-width="2"/>
    <text x="505" y="265" font-size="11" font-weight="700" fill="#9333ea">bada</text>
    <text x="550" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">score = 0.3 (alag)</text>
  </g>

  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="o" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ea580c"/></marker>
  </defs>
</svg>
