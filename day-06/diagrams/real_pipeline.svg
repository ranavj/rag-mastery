<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Day 6: real document pipeline from PDF to cited search results</title>
  <rect width="720" height="500" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Day 6 — Pipeline ab REAL: PDF se citation tak</text>

  <!-- pipeline row -->
  <rect x="25" y="60" width="110" height="56" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="80" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">📄 ASLI PDF</text>
  <text x="80" y="102" text-anchor="middle" font-size="8.5" fill="#dc2626">binary! f.read() = kachra</text>

  <line x1="135" y1="88" x2="163" y2="88" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="166" y="60" width="105" height="56" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="218" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">LOAD</text>
  <text x="218" y="102" text-anchor="middle" font-size="8.5" fill="#6366f1">PyPDFLoader (adapter)</text>

  <line x1="271" y1="88" x2="299" y2="88" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="302" y="60" width="105" height="56" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="354" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">CLEAN 🧹</text>
  <text x="354" y="102" text-anchor="middle" font-size="8.5" fill="#ca8a04">header/footer hatao</text>

  <line x1="407" y1="88" x2="435" y2="88" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="438" y="60" width="105" height="56" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="490" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">CHUNK</text>
  <text x="490" y="102" text-anchor="middle" font-size="8.5" fill="#16a34a">Day-3 skill (500/80)</text>

  <line x1="543" y1="88" x2="571" y2="88" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="574" y="60" width="120" height="56" rx="10" fill="#fdf4ff" stroke="#f0abfc" stroke-width="1.5"/>
  <text x="634" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#a21caf">CHROMA</text>
  <text x="634" y="102" text-anchor="middle" font-size="8.5" fill="#c026d3">Day-5 skill (persist)</text>

  <!-- metadata inheritance callout -->
  <rect x="60" y="150" width="600" height="86" rx="10" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="360" y="174" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">🧬 split_documents = metadata VIRASAT (inheritance)</text>
  <text x="360" y="196" text-anchor="middle" font-size="10" fill="#0284c7">Har chunk apne page ka pata saath rakhta: {source: "bajaj...pdf", page: 2}</text>
  <text x="360" y="216" text-anchor="middle" font-size="10" fill="#0284c7">Day 5 mein yeh label FAKE tha (haath se likha) — ab LOADER khud deta hai = SACH</text>

  <!-- query result -->
  <text x="360" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Query: "What is the penalty for EMI bounce?"</text>
  <rect x="90" y="285" width="540" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="110" y="308" font-size="11" font-weight="700" fill="#15803d">dist=0.994 | 📄 bajaj_finance_policy_reference.pdf — PAGE 2</text>
  <text x="110" y="330" font-size="10.5" fill="#14532d">"EMI Bounce Charge: Rs 1,000 + GST per bounced NACH/ECS mandate"</text>

  <line x1="360" y1="345" x2="360" y2="372" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="150" y="375" width="420" height="46" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="360" y="395" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">📚 CITATIONS ka foundation</text>
  <text x="360" y="412" text-anchor="middle" font-size="9.5" fill="#c2410c">"jawab page 2 se aaya" — user verify kar sakta = TRUST (Perplexity/Claude style)</text>

  <!-- dirty data lesson -->
  <rect x="60" y="440" width="600" height="48" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="360" y="460" text-anchor="middle" font-size="10.5" font-weight="700" fill="#b45309">🧹 Dirty-data lesson: har page ka same header/footer → har chunk mein milawat → blurry vectors</text>
  <text x="360" y="478" text-anchor="middle" font-size="10" fill="#92400e">→ sab chunks farzi-similar → retrieval dhundhla. Isliye CLEAN step chunking se PEHLE zaroori.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#9ca3af"/></marker>
  </defs>
</svg>
