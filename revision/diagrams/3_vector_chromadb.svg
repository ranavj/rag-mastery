<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Vector and ChromaDB — numbers stored in a database</title>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="32" text-anchor="middle" font-size="17" font-weight="800" fill="#1a1a1a">3. VECTOR + 4. ChromaDB - numbers ko store karna</text>

  <rect x="40" y="55" width="640" height="46" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.3"/>
  <text x="360" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">VECTOR = embedding ka result = bas woh numbers ki list [0.1, 0.8, 0.06, ...]</text>
  <text x="360" y="93" text-anchor="middle" font-size="9" fill="#6366f1">(alag cheez nahi - embedding jo banata, use hi "vector" kehte)</text>

  <rect x="40" y="125" width="120" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.3"/>
  <text x="100" y="145" text-anchor="middle" font-size="10" fill="#15803d">chunk (text)</text>
  <text x="100" y="160" text-anchor="middle" font-size="8.5" fill="#16a34a">"Refund 30 din"</text>
  <line x1="162" y1="147" x2="196" y2="147" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <text x="179" y="140" text-anchor="middle" font-size="7.5" fill="#6b7280">embed</text>

  <rect x="198" y="125" width="130" height="44" rx="8" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1.3"/>
  <text x="263" y="145" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#7e22ce">[0.1, 0.8, ...]</text>
  <text x="263" y="160" text-anchor="middle" font-size="8.5" fill="#9333ea">VECTOR</text>
  <line x1="330" y1="147" x2="364" y2="147" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <text x="347" y="140" text-anchor="middle" font-size="7.5" fill="#6b7280">store</text>

  <ellipse cx="500" cy="135" rx="120" ry="16" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <path d="M380 135 L380 250 A120 16 0 0 0 620 250 L620 135" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <ellipse cx="500" cy="135" rx="120" ry="16" fill="#bae6fd" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="500" y="140" text-anchor="middle" font-size="12" font-weight="800" fill="#0369a1">ChromaDB</text>

  <text x="400" y="175" font-size="9" font-family="monospace" fill="#0c4a6e">doc1  [0.1,0.8,..]  {page:2}</text>
  <text x="400" y="195" font-size="9" font-family="monospace" fill="#0c4a6e">doc2  [0.3,0.2,..]  {page:5}</text>
  <text x="400" y="215" font-size="9" font-family="monospace" fill="#0c4a6e">doc3  [0.9,0.1,..]  {page:7}</text>
  <text x="400" y="235" font-size="9" font-family="monospace" fill="#0c4a6e">... 40 rows</text>
  <text x="500" y="278" text-anchor="middle" font-size="9" fill="#0284c7">text + vector + metadata (page) saath</text>

  <rect x="60" y="300" width="600" height="75" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.4"/>
  <text x="360" y="322" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">ChromaDB = vectors rakhne wala DATABASE</text>
  <text x="90" y="344" font-size="9.5" fill="#92400e">- disk pe save (script band ho, data rahega - persist)</text>
  <text x="90" y="360" font-size="9.5" fill="#92400e">- search karta (query se milte-julte vectors dhundta) + metadata filter</text>
  <text x="380" y="344" font-size="9.5" fill="#92400e">- Frontend: IndexedDB /</text>
  <text x="380" y="360" font-size="9.5" fill="#92400e">   localStorage jaisa (persistent)</text>

  <text x="360" y="405" text-anchor="middle" font-size="10.5" font-weight="700" fill="#374151">Ek line: vector = numbers - ChromaDB = un numbers ka ghar (DB)</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#9ca3af"/></marker></defs>
</svg>
