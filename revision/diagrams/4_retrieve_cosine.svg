<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Retrieve — query compared to stored vectors via cosine</title>
  <rect width="720" height="480" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="800" fill="#1a1a1a">5. RETRIEVE + Cosine (setup se jodke)</text>

  <rect x="30" y="48" width="660" height="34" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="360" y="69" text-anchor="middle" font-size="9.5" fill="#94a3b8">SETUP (pehle ho chuka): chunk - embed - vector - ChromaDB me stored</text>

  <ellipse cx="150" cy="120" rx="105" ry="14" fill="#bae6fd" stroke="#38bdf8" stroke-width="1.5"/>
  <path d="M45 120 L45 230 A105 14 0 0 0 255 230 L255 120" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <ellipse cx="150" cy="120" rx="105" ry="14" fill="#bae6fd" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="150" y="124" text-anchor="middle" font-size="11" font-weight="800" fill="#0369a1">ChromaDB (stored)</text>
  <text x="70" y="160" font-size="9" font-family="monospace" fill="#0c4a6e">Refund  [0.1,0.8,..]</text>
  <text x="70" y="180" font-size="9" font-family="monospace" fill="#0c4a6e">Shipping[0.3,0.2,..]</text>
  <text x="70" y="200" font-size="9" font-family="monospace" fill="#0c4a6e">Pizza   [0.9,0.1,..]</text>
  <text x="150" y="250" text-anchor="middle" font-size="8.5" fill="#0284c7">40 stored vectors</text>

  <rect x="440" y="100" width="240" height="44" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <text x="560" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">User query</text>
  <text x="560" y="136" text-anchor="middle" font-size="9" fill="#6366f1">"paisa wapas kab?"</text>
  <line x1="560" y1="144" x2="560" y2="168" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <text x="600" y="160" font-size="8.5" fill="#6b7280">embed (same model)</text>

  <rect x="470" y="172" width="180" height="38" rx="8" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1.3"/>
  <text x="560" y="196" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#7e22ce">query vector [0.1,0.7,..]</text>

  <line x1="470" y1="191" x2="270" y2="185" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#b)"/>
  <text x="370" y="178" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">COSINE compare</text>
  <text x="370" y="205" text-anchor="middle" font-size="8.5" fill="#a16207">(har stored vector se)</text>

  <rect x="440" y="235" width="250" height="90" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.4"/>
  <text x="565" y="256" text-anchor="middle" font-size="10.5" font-weight="700" fill="#b45309">Cosine score (0-1, zyada=paas)</text>
  <text x="455" y="278" font-size="9.5" fill="#15803d">Refund   - 0.82 (paas)</text>
  <text x="455" y="296" font-size="9.5" fill="#92400e">Shipping - 0.30</text>
  <text x="455" y="314" font-size="9.5" fill="#dc2626">Pizza    - 0.05 (door)</text>

  <line x1="440" y1="280" x2="360" y2="360" stroke="#16a34a" stroke-width="2.5" marker-end="url(#g)"/>
  <text x="330" y="330" font-size="9" font-weight="700" fill="#16a34a">top chuno</text>

  <rect x="180" y="355" width="360" height="46" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="360" y="376" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">RETRIEVED: top chunks (Refund wala)</text>
  <text x="360" y="393" text-anchor="middle" font-size="9" fill="#16a34a">yeh chunks aage LLM ko jayenge (agla step)</text>

  <text x="360" y="430" text-anchor="middle" font-size="10.5" font-weight="700" fill="#374151">Retrieve = query vector ko stored vectors se cosine se compare - sabse paas wale uthao</text>
  <text x="360" y="452" text-anchor="middle" font-size="10" fill="#6b7280">"paisa wapas" = "refund" (meaning paas) - isliye Refund chunk mila (shabd match nahi!)</text>
  <text x="360" y="470" text-anchor="middle" font-size="9.5" fill="#94a3b8">Frontend: search + ranking (best match top pe)</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#9ca3af"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#f59e0b"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#16a34a"/></marker>
  </defs>
</svg>
