<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Augment, Generate, Cite — chunks plus query to Claude to answer</title>
  <rect width="720" height="470" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="800" fill="#1a1a1a">6. AUGMENT - 7. GENERATE - 8. CITE (retrieve se aage)</text>

  <rect x="30" y="46" width="660" height="30" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="360" y="65" text-anchor="middle" font-size="9.5" fill="#94a3b8">Pehle: retrieve ne top chunks nikaale (Refund wala) + user query</text>

  <rect x="40" y="92" width="200" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.3"/>
  <text x="140" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">retrieved chunks</text>
  <text x="140" y="128" text-anchor="middle" font-size="8.5" fill="#16a34a">"Refund 30 din... [page 2]"</text>

  <rect x="40" y="146" width="200" height="40" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.3"/>
  <text x="140" y="164" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca">user query</text>
  <text x="140" y="179" text-anchor="middle" font-size="8.5" fill="#6366f1">"paisa wapas kab?"</text>

  <line x1="242" y1="115" x2="285" y2="130" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <line x1="242" y1="165" x2="285" y2="145" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <rect x="288" y="100" width="180" height="80" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="378" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">AUGMENT = PROMPT</text>
  <text x="300" y="140" font-size="8" fill="#92400e">"Sirf CONTEXT se jawab do:</text>
  <text x="300" y="154" font-size="8" fill="#92400e"> {chunks}</text>
  <text x="300" y="168" font-size="8" fill="#92400e"> Q: {query}"</text>

  <line x1="470" y1="140" x2="510" y2="140" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <rect x="513" y="112" width="160" height="56" rx="10" fill="#fdf4ff" stroke="#f0abfc" stroke-width="1.5"/>
  <text x="593" y="136" text-anchor="middle" font-size="12" font-weight="700" fill="#a21caf">GENERATE</text>
  <text x="593" y="153" text-anchor="middle" font-size="9" fill="#c026d3">Claude (LLM)</text>

  <line x1="593" y1="168" x2="593" y2="200" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="180" y="205" width="440" height="80" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="400" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">ANSWER</text>
  <text x="400" y="250" text-anchor="middle" font-size="10" fill="#166534">"Refund 30 din ke andar milta hai."</text>
  <text x="400" y="272" text-anchor="middle" font-size="10" font-weight="700" fill="#ea580c">CITE: source policy.pdf, page 2</text>

  <rect x="60" y="310" width="600" height="70" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.4"/>
  <text x="360" y="332" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">GROUNDING (RAG ka dil)</text>
  <text x="90" y="354" font-size="9.5" fill="#92400e">- prompt me likha "SIRF context se jawab do" - Claude jhooth nahi banata</text>
  <text x="90" y="370" font-size="9.5" fill="#92400e">- context me na ho - "jaankari nahi hai" (hallucination se bachav)</text>

  <text x="360" y="410" text-anchor="middle" font-size="10.5" font-weight="700" fill="#374151">Augment = chunks+query jodna - Generate = Claude jawab - Cite = source page batana</text>
  <text x="360" y="432" text-anchor="middle" font-size="10" fill="#6b7280">Cite ka page metadata se aata (Day 6) - user verify kar sake = TRUST</text>
  <text x="360" y="452" text-anchor="middle" font-size="9.5" fill="#94a3b8">Frontend: chunks = props, Claude = render engine, answer = rendered output</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#9ca3af"/></marker></defs>
</svg>
