<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Chunk — breaking a big document into small pieces</title>
  <rect width="700" height="320" fill="#ffffff"/>
  <text x="350" y="34" text-anchor="middle" font-size="17" font-weight="800" fill="#1a1a1a">1. CHUNK — bada document to chhote tukde</text>

  <rect x="50" y="70" width="150" height="180" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="125" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">Big Document</text>
  <line x1="65" y1="115" x2="185" y2="115" stroke="#a5b4fc" stroke-width="1"/>
  <line x1="65" y1="130" x2="185" y2="130" stroke="#a5b4fc" stroke-width="1"/>
  <line x1="65" y1="145" x2="185" y2="145" stroke="#a5b4fc" stroke-width="1"/>
  <line x1="65" y1="160" x2="185" y2="160" stroke="#a5b4fc" stroke-width="1"/>
  <line x1="65" y1="175" x2="185" y2="175" stroke="#a5b4fc" stroke-width="1"/>
  <line x1="65" y1="190" x2="185" y2="190" stroke="#a5b4fc" stroke-width="1"/>
  <line x1="65" y1="205" x2="185" y2="205" stroke="#a5b4fc" stroke-width="1"/>
  <line x1="65" y1="220" x2="185" y2="220" stroke="#a5b4fc" stroke-width="1"/>
  <text x="125" y="242" text-anchor="middle" font-size="9" fill="#6366f1">(500 pages - bahut bada)</text>

  <line x1="205" y1="160" x2="270" y2="160" stroke="#f59e0b" stroke-width="3" marker-end="url(#a)"/>
  <text x="237" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">TODO</text>
  <text x="237" y="178" text-anchor="middle" font-size="8" fill="#a16207">splitter</text>

  <rect x="290" y="80" width="160" height="42" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.3"/>
  <text x="370" y="105" text-anchor="middle" font-size="11" fill="#15803d">chunk 1 (paragraph)</text>
  <rect x="290" y="130" width="160" height="42" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.3"/>
  <text x="370" y="155" text-anchor="middle" font-size="11" fill="#15803d">chunk 2</text>
  <rect x="290" y="180" width="160" height="42" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.3"/>
  <text x="370" y="205" text-anchor="middle" font-size="11" fill="#15803d">chunk 3</text>
  <text x="370" y="242" text-anchor="middle" font-size="9" fill="#16a34a">... 40 chhote tukde</text>

  <rect x="480" y="90" width="180" height="130" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.3"/>
  <text x="570" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">Yaad rakho</text>
  <text x="490" y="134" font-size="9" fill="#92400e">- chunk_size = tukda kitna bada</text>
  <text x="490" y="152" font-size="9" fill="#92400e">- overlap = thoda repeat (context</text>
  <text x="500" y="165" font-size="9" fill="#92400e">na tute)</text>
  <text x="490" y="185" font-size="9" fill="#92400e">- na bahut bada (dhundhla)</text>
  <text x="490" y="200" font-size="9" fill="#92400e">- na bahut chhota (context kho)</text>

  <text x="350" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Frontend: pagination - poora data nahi, page-by-page tukde</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#f59e0b"/></marker></defs>
</svg>
