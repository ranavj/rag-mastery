<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Embedding — how text becomes a list of numbers</title>
  <rect width="720" height="440" fill="#ffffff"/>
  <text x="360" y="32" text-anchor="middle" font-size="17" font-weight="800" fill="#1a1a1a">2. EMBEDDING - text kaise numbers banta (andar ka process)</text>

  <rect x="40" y="50" width="640" height="40" rx="8" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.3"/>
  <text x="360" y="68" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0369a1">Pehle: model karodon text pe TRAIN hua - patterns seekhe (refund = paisa wapas)</text>
  <text x="360" y="83" text-anchor="middle" font-size="9" fill="#0284c7">(bachche jaisa - hazaron baar sun ke seekh gaya)</text>

  <rect x="40" y="115" width="150" height="46" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.4"/>
  <text x="115" y="135" text-anchor="middle" font-size="11" fill="#15803d">"Refund 30 din"</text>
  <text x="115" y="152" text-anchor="middle" font-size="8.5" fill="#16a34a">(text chunk)</text>
  <line x1="192" y1="138" x2="228" y2="138" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <text x="210" y="128" text-anchor="middle" font-size="8" fill="#6b7280">1. todo</text>

  <rect x="230" y="115" width="150" height="46" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.4"/>
  <text x="305" y="132" text-anchor="middle" font-size="9.5" fill="#a16207">["refund","30","din"]</text>
  <text x="305" y="150" text-anchor="middle" font-size="8.5" fill="#ca8a04">TOKENS (chhote tukde)</text>
  <line x1="382" y1="138" x2="418" y2="138" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <text x="400" y="128" text-anchor="middle" font-size="8" fill="#6b7280">2. model</text>

  <rect x="420" y="112" width="150" height="52" rx="10" fill="#fdf4ff" stroke="#f0abfc" stroke-width="1.6"/>
  <text x="495" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#a21caf">Model ka "dimaag"</text>
  <text x="495" y="149" text-anchor="middle" font-size="8" fill="#c026d3">(seekhi pehchan lagata)</text>
  <line x1="572" y1="138" x2="608" y2="138" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>
  <text x="590" y="128" text-anchor="middle" font-size="8" fill="#6b7280">3. banao</text>

  <rect x="610" y="115" width="90" height="46" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.4"/>
  <text x="655" y="134" text-anchor="middle" font-size="9" font-family="monospace" fill="#4338ca">[0.8,0.7,</text>
  <text x="655" y="147" text-anchor="middle" font-size="9" font-family="monospace" fill="#4338ca">0.05...]</text>
  <text x="655" y="159" text-anchor="middle" font-size="7.5" fill="#6366f1">384 numbers</text>

  <rect x="120" y="185" width="480" height="120" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.4"/>
  <text x="360" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Har number = ek "meaning ka pehlu" (chhupa sawaal)</text>
  <text x="150" y="232" font-size="10" fill="#92400e">number 1 - "paise se related?"  - 0.8 (haan)</text>
  <text x="150" y="252" font-size="10" fill="#92400e">number 2 - "time se related?"    - 0.7 (haan, "30 din")</text>
  <text x="150" y="272" font-size="10" fill="#92400e">number 3 - "khaane se related?"  - 0.05 (nahi)</text>
  <text x="150" y="292" font-size="9.5" font-style="italic" fill="#a16207">... 384 aise pehlu (model ne khud seekhe, insaan ko exact nahi pata)</text>

  <rect x="60" y="320" width="600" height="60" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.4"/>
  <text x="360" y="342" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Nateeja: same MEANING wale text - milte-julte numbers (paas)</text>
  <text x="360" y="362" text-anchor="middle" font-size="9.5" fill="#16a34a">"refund" = "paisa wapas" (paas) - "pizza" door - shabd nahi, MEANING match</text>

  <text x="360" y="405" text-anchor="middle" font-size="10.5" fill="#6b7280">Analogy: insaan ko [height,age,fitness...] se describe - har number ek pehlu (Day 2)</text>
  <text x="360" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Aapko andar ka math nahi jaanna - bas: "model text ka meaning-fingerprint banata"</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#9ca3af"/></marker></defs>
</svg>
