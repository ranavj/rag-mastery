<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img">
  <title>Eval — scoring the answer with an LLM judge</title>
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="800" fill="#1a1a1a">9. EVAL - jawab ka report card (generate ke BAAD)</text>

  <rect x="30" y="46" width="660" height="30" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="360" y="65" text-anchor="middle" font-size="9.5" fill="#94a3b8">Pehle: Claude ne jawab bana diya. AB use score karte hain (baad ka check)</text>

  <rect x="40" y="95" width="150" height="30" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="115" y="115" text-anchor="middle" font-size="9" fill="#4338ca">question</text>
  <rect x="40" y="132" width="150" height="30" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="115" y="152" text-anchor="middle" font-size="9" fill="#15803d">context (chunks)</text>
  <rect x="40" y="169" width="150" height="30" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="115" y="189" text-anchor="middle" font-size="9" fill="#166534">answer (jawab)</text>

  <line x1="192" y1="147" x2="245" y2="147" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="248" y="118" width="150" height="58" rx="10" fill="#fdf4ff" stroke="#f0abfc" stroke-width="1.6"/>
  <text x="323" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#a21caf">JUDGE</text>
  <text x="323" y="160" text-anchor="middle" font-size="8.5" fill="#c026d3">(LLM = examiner)</text>

  <line x1="400" y1="147" x2="450" y2="147" stroke="#9ca3af" stroke-width="2" marker-end="url(#a)"/>

  <rect x="453" y="95" width="230" height="110" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="568" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">SCORES (0-1)</text>
  <text x="470" y="138" font-size="9.5" fill="#92400e">faithfulness     - 1.00  (context se?)</text>
  <text x="470" y="158" font-size="9.5" fill="#92400e">answer_relevancy - 0.90  (sawaal ka?)</text>
  <text x="470" y="178" font-size="9.5" fill="#92400e">context_precision- 1.00 (retrieval?)</text>
  <text x="568" y="197" text-anchor="middle" font-size="8.5" fill="#a16207">= report card</text>

  <rect x="60" y="225" width="600" height="60" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.4"/>
  <text x="360" y="247" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">Faithfulness = hallucination detector</text>
  <text x="360" y="268" text-anchor="middle" font-size="9.5" fill="#7f1d1d">agar jawab context ke bahar (jhooth) - faithfulness = 0.00 (turant pakda)</text>

  <text x="360" y="315" text-anchor="middle" font-size="10.5" font-weight="700" fill="#374151">Eval = "achha lag raha" (feeling) - NUMBER. Change ka asar naapo, systematically improve.</text>
  <text x="360" y="338" text-anchor="middle" font-size="10" fill="#6b7280">LLM-as-judge = ek LLM doosre ka jawab grade kare (exam checker)</text>
  <text x="360" y="360" text-anchor="middle" font-size="10" fill="#6b7280">Par eval khud bhi perfect nahi (embedding/LLM pe based) - kai metrics dekho</text>
  <text x="360" y="385" text-anchor="middle" font-size="9.5" fill="#94a3b8">Frontend: unit test / Lighthouse score - RAG ka test</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#9ca3af"/></marker></defs>
</svg>
